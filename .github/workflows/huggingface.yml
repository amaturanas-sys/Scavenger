name: Deploy backend to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/**"
      - "frontend/**"
      - "requirements.txt"
      - "Dockerfile"
      - "deploy/huggingface/**"
      - ".github/workflows/huggingface.yml"

# Requiere:
#   - Secret  HF_TOKEN      : token de escritura de Hugging Face
#   - HF_SPACE_ID ("usuario/nombre-del-space"): admite variable O secret.
jobs:
  deploy:
    name: Sync repo to HF Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historia completa: evita "shallow update not allowed" al push

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Tolera HF_SPACE_ID puesto como variable o como secret.
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID || secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "::notice::HF_TOKEN y/o HF_SPACE_ID no configurados; se omite el deploy. Ver docs/DEPLOY.md."
            exit 0
          fi
          set -e
          echo "Desplegando a Space: ${HF_SPACE_ID}"
          HF_OWNER="${HF_SPACE_ID%%/*}"   # usuario dueño del Space (forma canónica de auth en HF)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # El Space usa el README con front-matter de Hugging Face.
          cp deploy/huggingface/README.md README.md
          # Deploy como commit aplastado SIN historial: HF rechaza binarios
          # grandes presentes en cualquier commit empujado (aunque la version
          # actual sea chica). Un commit huerfano solo lleva el arbol actual.
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy: SCAVENGER ($GITHUB_SHA)"
          git push --force "https://${HF_OWNER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}.git" hf-deploy:main
