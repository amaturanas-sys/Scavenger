name: Refresh real data (prices + nutrition)

# Refresca precios reales (scraping Jumbo/Santa Isabel/Lider) y, si hay
# credenciales, la nutricion (FatSecret) directamente hacia la BD de
# produccion. Los runners de GitHub tienen egress abierto, asi que pueden
# alcanzar las cadenas y FatSecret (a diferencia del Space o el entorno cloud).
#
# Requiere:
#   - Secret  SCAVENGER_DATABASE_URL : BD de produccion (p.ej. Supabase pooler).
# Opcional (para nutricion):
#   - Secrets SCAVENGER_FATSECRET_KEY / SCAVENGER_FATSECRET_SECRET.
on:
  workflow_dispatch:
    inputs:
      retailers:
        description: "Cadenas a refrescar (coma-separado; vacio = todas)"
        required: false
        default: ""
      limit:
        description: "Maximo de alimentos a procesar (vacio = todos)"
        required: false
        default: ""
      enrich:
        description: "Completar nutricion via FatSecret"
        type: boolean
        required: false
        default: true
      force:
        description: "Forzar re-match (ignora la memoria de precios; gasta cuota Apify)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "17 8 * * 1"  # lunes 08:17 UTC (semanal)

jobs:
  refresh:
    name: Scrape precios/nutricion reales hacia la BD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refrescar datos reales
        env:
          SCAVENGER_DATABASE_URL: ${{ secrets.SCAVENGER_DATABASE_URL }}
          SCAVENGER_FATSECRET_KEY: ${{ secrets.SCAVENGER_FATSECRET_KEY }}
          SCAVENGER_FATSECRET_SECRET: ${{ secrets.SCAVENGER_FATSECRET_SECRET }}
          # Apify: token como secret; actores/inputs/limites como variables.
          SCAVENGER_APIFY_TOKEN: ${{ secrets.SCAVENGER_APIFY_TOKEN }}
          SCAVENGER_APIFY_JUMBO_ACTOR: ${{ vars.SCAVENGER_APIFY_JUMBO_ACTOR }}
          SCAVENGER_APIFY_UNIMARC_ACTOR: ${{ vars.SCAVENGER_APIFY_UNIMARC_ACTOR }}
          SCAVENGER_APIFY_LIDER_ACTOR: ${{ vars.SCAVENGER_APIFY_LIDER_ACTOR }}
          SCAVENGER_APIFY_JUMBO_INPUT: ${{ vars.SCAVENGER_APIFY_JUMBO_INPUT }}
          SCAVENGER_APIFY_UNIMARC_INPUT: ${{ vars.SCAVENGER_APIFY_UNIMARC_INPUT }}
          SCAVENGER_APIFY_LIDER_INPUT: ${{ vars.SCAVENGER_APIFY_LIDER_INPUT }}
          SCAVENGER_APIFY_MAX_RESULTS: ${{ vars.SCAVENGER_APIFY_MAX_RESULTS }}
          SCAVENGER_APIFY_MONTHLY_BUDGET: ${{ vars.SCAVENGER_APIFY_MONTHLY_BUDGET }}
          SCAVENGER_PRICE_TTL_DAYS: ${{ vars.SCAVENGER_PRICE_TTL_DAYS }}
          RETAILERS: ${{ github.event.inputs.retailers }}
          LIMIT: ${{ github.event.inputs.limit }}
          # En schedule no hay inputs: el default efectivo es "enriquecer".
          ENRICH: ${{ github.event.inputs.enrich }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ -z "$SCAVENGER_DATABASE_URL" ]; then
            echo "::notice::SCAVENGER_DATABASE_URL no configurado; se omite el refresco. Ver docs/DATOS_REALES.md."
            exit 0
          fi
          ARGS=""
          if [ -n "$RETAILERS" ]; then
            IFS=',' read -ra RS <<< "$RETAILERS"
            for r in "${RS[@]}"; do
              r="$(echo "$r" | xargs)"   # trim
              [ -n "$r" ] && ARGS="$ARGS --retailer $r"
            done
          fi
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          if [ "$ENRICH" = "false" ]; then ARGS="$ARGS --no-enrich"; fi
          if [ "$FORCE" = "true" ]; then ARGS="$ARGS --force"; fi
          echo "Ejecutando: python -m backend.refresh_data $ARGS"
          python -m backend.refresh_data $ARGS
