name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "frontend/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "frontend/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Copy web frontend into app assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp -r frontend/* android/app/src/main/assets/www/

      - name: Bake backend URL into the APK (optional)
        if: vars.SCAVENGER_API_BASE != ''
        run: |
          echo "Backend por defecto: ${{ vars.SCAVENGER_API_BASE }}"
          echo "window.SCAVENGER_API_BASE = '${{ vars.SCAVENGER_API_BASE }}';" > android/app/src/main/assets/www/config.js

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk scavenger-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scavenger-debug-apk
          path: scavenger-debug.apk

      - name: Publish to android-latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: SCAVENGER · APK
          prerelease: true
          files: scavenger-debug.apk
          body: |
            APK de SCAVENGER — app cliente (WebView).

            - `scavenger-release.apk`: build de **release firmado** (recomendado).
            - `scavenger-debug.apk`: build de prueba (debug).

            La app se conecta al backend de SCAVENGER. Si la variable de repo
            `SCAVENGER_API_BASE` está configurada, la APK ya viene apuntando al
            backend público; si no, configura la URL al abrir la app (⚙️).

            Ver `docs/ANDROID.md` y `docs/DEPLOY.md`.

      # --- Release firmado (solo si están los secrets del keystore) ---
      - name: Detect release signing
        id: signing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Sin ANDROID_KEYSTORE_BASE64; se omite el APK firmado. Ver docs/ANDROID.md."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/scavenger.keystore"
          export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/scavenger.keystore"
          (cd android && ./gradlew --no-daemon assembleRelease)
          cp android/app/build/outputs/apk/release/app-release.apk scavenger-release.apk

      - name: Upload signed release artifact
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scavenger-release-apk
          path: scavenger-release.apk

      - name: Publish signed release to android-latest
        if: ${{ steps.signing.outputs.enabled == 'true' && github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          files: scavenger-release.apk
