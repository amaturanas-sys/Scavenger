<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCAVENGER · Meal prep costo-efectivo</title>
  <link rel="icon" type="image/png" href="favicon.png?v=16" />
  <link rel="apple-touch-icon" href="logo-icon.png?v=16" />
  <meta name="theme-color" content="#0c0c0e" />
  <link rel="stylesheet" href="styles.css?v=16" />
</head>
<body>
  <!-- Cabecera: navegación entre pantallas (◀ logo ▶) -->
  <header class="topbar">
    <button class="navarrow" id="prevScreen" aria-label="Pantalla anterior">&#10094;</button>
    <img class="logo" src="logo.png?v=16" alt="SCAVENGER" id="homeLogo" />
    <button class="navarrow" id="nextScreen" aria-label="Pantalla siguiente">&#10095;</button>
  </header>

  <!-- Barra utilitaria: usuario, indicadores de pantalla, menú -->
  <div class="utilbar">
    <select id="userSelect" class="user-select" title="Usuario"></select>
    <div class="dots" id="dots">
      <span data-go="0" title="Inicio"></span>
      <span data-go="1" title="Ruleta"></span>
      <span data-go="2" title="Perfil"></span>
    </div>
    <button id="menuBtn" class="iconbtn" title="Más opciones">&#9776;</button>
  </div>

  <main id="deck">
    <!-- ===================== PANTALLA 0 · HOME / LANDING ===================== -->
    <section class="screen active" data-screen="home">
      <div class="landing">
        <p class="welcome" id="welcome">Hola 🦝</p>
        <p class="hint" id="welcomeSub">Arma comidas, planifica tu semana y compra al mejor precio.</p>
        <div class="hub-grid">
          <button class="hub-btn wide accent" data-act="guiado">Armar mi día (paso a paso)</button>
          <button class="hub-btn" data-act="ruleta">Armar comida</button>
          <button class="hub-btn" data-act="calendario">Calendario</button>
          <button class="hub-btn" data-act="perfil">Perfil</button>
          <button class="hub-btn" data-act="generar">Generar minuta</button>
          <button class="hub-btn" data-act="minutas">Mis minutas</button>
          <button class="hub-btn" data-act="catalogo">Catálogo</button>
          <button class="hub-btn wide" data-act="nuevo">Crear nuevo usuario</button>
        </div>
        <!-- Calendario en la región inferior: deslizar para planificar jornadas -->
        <div class="landing-cal" id="landingCal"></div>
      </div>
    </section>

    <!-- ===================== PANTALLA 1 · RULETA ===================== -->
    <section class="screen" data-screen="ruleta">
      <div class="meal-row">
        <label class="inline">Comida
          <select id="builderMeal">
            <option value="desayuno">Desayuno</option>
            <option value="snack 1">Snack 1</option>
            <option value="snack 2">Snack 2</option>
            <option value="almuerzo" selected>Almuerzo</option>
            <option value="cena">Cena</option>
          </select>
        </label>
        <span id="builderStatus" class="status"></span>
      </div>

      <!-- Carretes (tragamonedas) -->
      <div class="reelbox">
        <div class="reels" id="reels"></div>
      </div>

      <!-- Panel de control: dona de macros + acciones + costo -->
      <div class="controlbox">
        <div class="donut-wrap">
          <svg class="donut" id="donut" viewBox="0 0 42 42" aria-label="Distribución de macros"></svg>
        </div>
        <div class="control-actions">
          <button id="addMealBtn" class="bigbtn add" title="Agregar al día">&#43;</button>
          <button id="spinBtn" class="bigbtn spin" title="Girar (aleatorio)">&#8634;</button>
        </div>
        <div class="pricebox" id="priceBox">$0</div>
      </div>

      <div class="platos" id="platosInfo"></div>
      <div id="dayBuild"></div>
    </section>

    <!-- ===================== PANTALLA 2 · PERFIL ===================== -->
    <section class="screen" data-screen="perfil">
      <div class="panel-dark targets" id="targetsCard">
        <div class="t-row"><span>Kcal/d</span><strong id="tKcal">—</strong></div>
        <div class="t-row"><span>Basal (TMB)</span><strong id="tBasal">—</strong></div>
        <div class="t-row"><span>Objetivo nutrientes (g/d)</span><strong id="tNutri">—</strong></div>
        <div class="t-row"><span>Objetivo economía ($/mes)</span><strong id="tEco">—</strong></div>
      </div>

      <form id="userForm" class="panel-dark profile-form">
        <label>Nombre <input name="name" type="text" placeholder="Tu nombre" /></label>
        <div class="two">
          <label>Peso (kg) <input name="weight_kg" type="number" value="70" step="0.1" /></label>
          <label>Altura (cm) <input name="height_cm" type="number" value="170" step="0.1" /></label>
        </div>
        <div class="two">
          <label>Edad <input name="age" type="number" value="30" min="10" max="110" /></label>
          <label>Sexo
            <select name="sex"><option value="M">Masculino</option><option value="F">Femenino</option></select>
          </label>
        </div>
        <details class="advanced">
          <summary>Objetivos y preferencias</summary>
          <div class="two">
            <label>Actividad
              <select name="activity_level">
                <option value="sedentario">Sedentario</option>
                <option value="ligero">Ligero</option>
                <option value="moderado" selected>Moderado</option>
                <option value="activo">Activo</option>
                <option value="muy_activo">Muy activo</option>
              </select>
            </label>
            <label>Objetivo
              <select name="goal">
                <option value="bajar">Bajar peso</option>
                <option value="mantener" selected>Mantener</option>
                <option value="subir">Subir masa</option>
              </select>
            </label>
          </div>
          <div class="two">
            <label>Comidas al día <input name="meals_per_day" type="number" min="1" max="8" value="4" /></label>
            <label>Proteína mín./plato (g) <input name="min_protein_per_meal_g" type="number" min="0" step="1" value="0" /></label>
          </div>
          <div class="two">
            <label>Presupuesto mensual (CLP) <input name="monthly_budget_clp" type="number" min="0" step="1000" value="0" /></label>
            <label>Presupuesto diario (CLP) <input name="daily_budget_clp" type="number" value="4000" step="100" /></label>
          </div>
          <label>Dieta
            <select name="diet_tags">
              <option value="">Sin restricción</option>
              <option value="vegetariano">Vegetariano</option>
              <option value="vegano">Vegano</option>
              <option value="sin_gluten">Sin gluten</option>
            </select>
          </label>
          <fieldset class="retailers-field">
            <legend>Supermercados cercanos</legend>
            <div id="retailerChecks" class="retailer-checks"></div>
          </fieldset>
        </details>
        <div class="form-actions">
          <button type="submit" class="primary">Guardar perfil</button>
          <button type="button" id="newUserBtn" class="btn-sm">+ Nuevo</button>
          <span id="userStatus" class="status"></span>
        </div>
      </form>
    </section>
  </main>

  <!-- Menú secundario (drawer) -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head"><h3>Más</h3><button class="iconbtn" id="drawerClose" aria-label="Cerrar">&#10005;</button></div>
    <button class="drawer-item" data-view="generar">Generar minuta + lista de compras</button>
    <button class="drawer-item" data-view="minutas">Mis minutas y saciedad</button>
    <button class="drawer-item" data-view="catalogo">Catálogo de alimentos</button>
    <button class="drawer-item" id="serverBtn">Configurar servidor</button>
  </aside>

  <!-- Vistas secundarias a pantalla completa -->
  <div class="overlay" id="overlay">
    <div class="overlay-head">
      <button class="iconbtn" id="overlayClose" aria-label="Cerrar">&#10005;</button>
      <h2 id="overlayTitle">—</h2>
    </div>
    <div class="overlay-body" id="overlayBody"></div>
  </div>

  <!-- Overlay secundario apilado: constructor de una comida (ruleta) sobre la jornada -->
  <div class="overlay overlay2" id="overlay2">
    <div class="overlay-head">
      <button class="iconbtn" id="overlay2Close" aria-label="Cerrar">&#10005;</button>
      <h2 id="overlay2Title">—</h2>
    </div>
    <div class="overlay-body" id="overlay2Body"></div>
  </div>

  <script src="config.js?v=16"></script>
  <script src="app.js?v=16"></script>
</body>
</html>
